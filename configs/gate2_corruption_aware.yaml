# Gate 2-C v2: Coupled residual + quality map v2 + corruption-aware training
#
# Key changes from gate2_safety.yaml:
#   - use_quality_gate=True with 4-channel quality map (v2: +valid_ratio)
#   - Coupled residual: g controls both blend AND correction
#   - Corruption-aware training: phase jitter + location jitter augmentation
#
# Usage:
#   python experiments/gate1_oracle.py \
#     --config configs/gate2_corruption_aware.yaml \
#     --output-dir results/gate2_corruption_aware \
#     --device cuda

seed: 2036
device: cuda

ofdm:
  num_subcarriers: 64
  num_symbols: 14
  subcarrier_spacing_hz: 120000.0
  carrier_frequency_hz: 28000000000.0
  cp_ratio: 0.07

channel:
  num_paths: 4
  max_delay_bins: 12.0
  max_abs_doppler_bins: 3.0
  fractional_delay: true
  fractional_doppler: true
  exponential_power_decay: 0.25

dataset:
  train_size: 4096
  test_size: 1024
  val_size: 1024
  snr_min_db: 10.0
  snr_max_db: 10.0
  pilot_density: 0.125
  pilot_pattern: random
  max_paths: 8
  token_version: 2
  token_source: estimated

training:
  epochs: 300
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.00001
  hidden_dim: 48
  num_threads: 4
  num_seeds: 3
  use_quality_gate: true
  # Corruption-aware training: exposes model to degraded tokens
  # so gate learns to respond to quality signals during training.
  token_augmentation:
    enabled: true
    batch_dropout_prob: 0.15          # 15% of batches get token dropout
    dropped_token_fraction: 0.3       # drop 30% of valid tokens per affected batch
    batch_shuffle_prob: 0.10          # 10% of batches get token shuffle
    # Note: phase/location jitter are applied per-sample in dataset,
    # not per-batch. For now we rely on dropout + shuffle which are
    # the most common failure modes identified in Gate 2-A.
