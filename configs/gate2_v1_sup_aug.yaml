# Gate 2 v1 + Gate Supervision + Matched Corruption Augmentation
#
# v1 token (9-dim) — the proven token representation
# + gate supervision (BCE with oracle expert advantage)
# + matched corruption augmentation (phase, jitter, coherent false)
# + TF auxiliary loss
#
# Target: v1 corruption robustness + improved gate dynamic range
#
# Usage:
#   python experiments/gate1_oracle.py \
#     --config configs/gate2_v1_sup_aug.yaml \
#     --output-dir results/gate2_v1_sup_aug \
#     --device cuda

seed: 2036
device: cuda

ofdm:
  num_subcarriers: 64
  num_symbols: 14
  subcarrier_spacing_hz: 120000.0
  carrier_frequency_hz: 28000000000.0
  cp_ratio: 0.07

channel:
  num_paths: 4
  max_delay_bins: 12.0
  max_abs_doppler_bins: 3.0
  fractional_delay: true
  fractional_doppler: true
  exponential_power_decay: 0.25

dataset:
  train_size: 4096
  test_size: 1024
  val_size: 1024
  snr_min_db: 10.0
  snr_max_db: 10.0
  pilot_density: 0.125
  pilot_pattern: random
  max_paths: 8
  token_version: 2
  token_source: estimated

training:
  epochs: 300
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.00001
  hidden_dim: 48
  num_threads: 4
  num_seeds: 3
  use_quality_gate: true
  # Gate supervision: teach gate which expert to trust
  gate_supervision:
    weight: 0.05
    temperature: 0.1
  # TF auxiliary loss: prevent branch degradation
  loss_weights:
    final: 1.0
    tf_aux: 0.2
    physical_aux: 0.0
  # Matched corruption augmentation: train on the failure modes
  # identified by Gate 2-A (phase, jitter, coherent false)
  token_augmentation:
    enabled: true
    batch_dropout_prob: 0.10
    dropped_token_fraction: 0.3
    batch_shuffle_prob: 0.05
    phase_prob: 0.15            # random gain phase rotation per sample
    jitter_std: 0.3             # location jitter std (bins)
    coherent_false: 1           # coherent false tokens per sample
