# Gate 2 Token v3: DD local-spectrum enhanced tokens
#
# Key changes from gate2_moe.yaml:
#   - token_version: 3 → 84-dim tokens (9 base + 25 score + 50 gain patches)
#   - Local DD spectrum patches around each NMS-detected peak
#   - Gate supervision: BCE loss on gate vs oracle expert-advantage targets
#   - Fixed valid_ratio bug
#
# Usage:
#   python experiments/gate1_oracle.py \
#     --config configs/gate2_token_v3.yaml \
#     --output-dir results/gate2_token_v3 \
#     --device cuda

seed: 2036
device: cuda

ofdm:
  num_subcarriers: 64
  num_symbols: 14
  subcarrier_spacing_hz: 120000.0
  carrier_frequency_hz: 28000000000.0
  cp_ratio: 0.07

channel:
  num_paths: 4
  max_delay_bins: 12.0
  max_abs_doppler_bins: 3.0
  fractional_delay: true
  fractional_doppler: true
  exponential_power_decay: 0.25

dataset:
  train_size: 4096
  test_size: 1024
  val_size: 1024
  snr_min_db: 10.0
  snr_max_db: 10.0
  pilot_density: 0.125
  pilot_pattern: random
  max_paths: 8
  token_version: 3          # 84-dim: 9 base + 25 score patch + 50 gain patch
  token_source: estimated

training:
  epochs: 300
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.00001
  hidden_dim: 48
  num_threads: 4
  num_seeds: 3
  use_quality_gate: true
  # Gate supervision: teach gate which expert to trust at each (n,m)
  gate_supervision:
    weight: 0.1              # BCE(g, g_star) weight in total loss
    temperature: 0.1          # sharpness of oracle target (lower = more binary)
  # Auxiliary losses: ensure each expert works independently
  loss_weights:
    final: 1.0
    tf_aux: 0.2              # L_tf = NMSE(E_tf, H_true) — keep TF expert healthy
    physical_aux: 0.0        # physical expert already strong via zero-init
