# Gate 1 stress work point: test whether Gate 1 benefits persist at low pilot density.
#
# Random pilots, density=0.0625, SNR=5 dB
# Very sparse pilots → DD identifiability is under pressure → tests whether
# the physics prior can compensate for degraded DD support.

seed: 2036
device: auto
ofdm:
  num_subcarriers: 64
  num_symbols: 14
  subcarrier_spacing_hz: 120000.0
  carrier_frequency_hz: 28000000000.0
  cp_ratio: 0.07
channel:
  num_paths: 4
  max_delay_bins: 12.0
  max_abs_doppler_bins: 3.0
  fractional_delay: true
  fractional_doppler: true
  exponential_power_decay: 0.25
dataset:
  train_size: 4096
  test_size: 1024
  val_size: 1024
  snr_min_db: 5.0
  snr_max_db: 5.0
  pilot_density: 0.0625
  pilot_pattern: random
  max_paths: 8
  token_version: 2
training:
  epochs: 300
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.00001
  hidden_dim: 48
  num_threads: 4
  num_seeds: 3
