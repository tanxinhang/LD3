# Gate 2 MoE: Mixture-of-Experts with dual auxiliary losses
#
# Key changes from gate2_safety:
#   - Auxiliary losses on each expert (E_tf, E_phys)
#   - Each expert is trained to work independently
#   - Gate only selects, not compensates for expert weakness
#   - Fixed valid_ratio bug (raw count, no clamp)
#   - Decoupled ablation switches (fusion_mode, use_residual, residual_coupling)
#
# Usage:
#   python experiments/gate1_oracle.py \
#     --config configs/gate2_moe.yaml \
#     --output-dir results/gate2_moe \
#     --device cuda

seed: 2036
device: cuda

ofdm:
  num_subcarriers: 64
  num_symbols: 14
  subcarrier_spacing_hz: 120000.0
  carrier_frequency_hz: 28000000000.0
  cp_ratio: 0.07

channel:
  num_paths: 4
  max_delay_bins: 12.0
  max_abs_doppler_bins: 3.0
  fractional_delay: true
  fractional_doppler: true
  exponential_power_decay: 0.25

dataset:
  train_size: 4096
  test_size: 1024
  val_size: 1024
  snr_min_db: 10.0
  snr_max_db: 10.0
  pilot_density: 0.125
  pilot_pattern: random
  max_paths: 8
  token_version: 2
  token_source: estimated

training:
  epochs: 300
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.00001
  hidden_dim: 48
  num_threads: 4
  num_seeds: 3
  use_quality_gate: true
  # MoE auxiliary losses: ensure each expert works independently
  loss_weights:
    final: 1.0
    tf_aux: 0.2          # L_tf = NMSE(E_tf, H_true)
    physical_aux: 0.2    # L_phys = NMSE(E_phys, H_true)
