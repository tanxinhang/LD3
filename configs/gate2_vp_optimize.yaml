# Gate 2 Optimized: VP refinement + multi-SNR + larger model + LR scheduler
#
# Tier 1 improvements (highest impact, lowest effort):
#   - VP refinement enabled (token_refine: vp) — +2~4 dB
#   - Multi-SNR training (5~20 dB) — +1~2 dB
#   - hidden_dim increased (48→96) — +0.5~1.5 dB
#   - Gate 3x3 conv — +0.3~0.8 dB
#   - Cosine LR scheduler — +0.3~0.8 dB
#   - Stronger gate supervision — +0.3~0.8 dB
#
# Usage:
#   python experiments/gate1_oracle.py \
#     --config configs/gate2_vp_optimize.yaml \
#     --output-dir results/gate2_vp_optimize \
#     --device cuda

seed: 2036
device: cuda

ofdm:
  num_subcarriers: 64
  num_symbols: 14
  subcarrier_spacing_hz: 120000.0
  carrier_frequency_hz: 28000000000.0
  cp_ratio: 0.07

channel:
  num_paths: 4
  max_delay_bins: 12.0
  max_abs_doppler_bins: 3.0
  fractional_delay: true
  fractional_doppler: true
  exponential_power_decay: 0.25

dataset:
  train_size: 4096
  test_size: 1024
  val_size: 1024
  snr_min_db: 5.0              # Multi-SNR: broader SNR range
  snr_max_db: 20.0
  pilot_density: 0.125
  pilot_pattern: random
  max_paths: 8
  token_version: 2
  token_source: estimated
  token_refine: ""  # VP removed — use OMP+Refiner              # VP continuous refinement (largest single gain)
  token_vp_rounds: 5            # More VP rounds
  token_vp_probes: 12           # More probes per round

training:
  epochs: 400                   # More epochs with LR scheduler
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.00001
  hidden_dim: 96                # Larger model capacity
  num_threads: 4
  num_seeds: 3
  use_quality_gate: true
  use_path_stats: true
  gate_kernel_size: 3           # 3x3 conv for spatial context
  # Gate supervision v2: normalized target + margin mask
  gate_supervision:
    weight: 0.05                # Stronger gate supervision
    temperature: 0.1
    margin: 0.05                # More positions supervised
  # TF auxiliary loss
  loss_weights:
    final: 1.0
    tf_aux: 0.2
    physical_aux: 0.0
  # Matched corruption augmentation
  token_augmentation:
    enabled: true
    clean_ratio: 0.75
    batch_dropout_prob: 0.05
    dropped_token_fraction: 0.3
    batch_shuffle_prob: 0.00
    phase_prob: 0.10
    jitter_std: 0.10
    coherent_false: 1
